<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Summernote Bundle Demo</title>

  <!-- Core CSS: Bootstrap (needed by this Summernote build) -->
  <link rel="stylesheet" href="./assets/plugins/bootstrap/css/bootstrap.min.css">

  <!-- Summernote styles + icon font (bundled) -->
  <link rel="stylesheet" href="./assets/css/plugins.css">
</head>
<body class="bg-light py-5">
  <div class="container">
    <h1 class="mb-4">Summernote Editor</h1>
    <div class="card">
      <div class="card-body">
        <div id="summernote"><p>Hello Summernote</p></div>
      </div>
    </div>
  </div>

  <!-- Dependencies -->
  <script src="./assets/js/jquery.min.js"></script>
  <script src="./assets/plugins/bootstrap/js/popper.min.js"></script>
  <script src="./assets/plugins/bootstrap/js/bootstrap.min.js"></script>

  <!-- Summernote core -->
  <script src="./assets/plugins/summernote/summernote1.js"></script>

  <!-- Init -->
  <script>
    (function () {
      'use strict';
      $('#summernote').summernote({
        height: 260,
        placeholder: 'Start typing...',
        toolbar: [
          ['style', ['style']],
          ['font', ['bold', 'italic', 'underline', 'clear']],
          ['fontname', ['fontname']],
          ['fontsize', ['fontsize']],
          ['color', ['color']],
          ['para', ['ul', 'ol', 'paragraph']],
          ['height', ['height']],
          ['insert', ['link', 'picture', 'video', 'table', 'hr']],
          ['view', ['fullscreen', 'codeview', 'help']]
        ],
        fontNames: ['Arial', 'Arial Black', 'Comic Sans MS', 'Courier New', 'Merriweather', 'Montserrat', 'Roboto', 'Times New Roman'],
        fontSizes: ['8','9','10','11','12','14','16','18','20','22','24','28','32','36','48','64']
      });
    })();
  </script>
</body>
</html>
